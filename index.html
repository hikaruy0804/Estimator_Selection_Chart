<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estimator Selection Guide</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: rgba(255, 251, 245, 0.88);
        --panel-strong: #fffaf2;
        --text: #1f1c18;
        --muted: #675d52;
        --line: rgba(78, 59, 35, 0.14);
        --accent: #c65d2e;
        --accent-strong: #8f2f12;
        --accent-soft: rgba(198, 93, 46, 0.12);
        --shadow: 0 24px 60px rgba(68, 42, 16, 0.12);
        --radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Hiragino Sans", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 202, 146, 0.45), transparent 32%),
          radial-gradient(circle at right 20%, rgba(197, 93, 46, 0.18), transparent 28%),
          linear-gradient(180deg, #f8f3ea 0%, var(--bg) 52%, #efe5d8 100%);
      }

      .shell {
        width: min(980px, calc(100% - 32px));
        margin: 28px auto 48px;
        display: grid;
        gap: 24px;
      }

      .hero,
      .panel,
      .result-modal {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .hero {
        padding: 32px;
        overflow: hidden;
        position: relative;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -80px -80px auto;
        width: 240px;
        height: 240px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(198, 93, 46, 0.28), transparent 65%);
      }

      .eyebrow {
        display: inline-flex;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 0.9;
        letter-spacing: -0.04em;
        /* max-width: 16ch; */
      }

      .hero p {
        margin: 0;
        max-width: 62ch;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.75;
      }

      .panel {
        padding: 32px;
      }

      .panel h2,
      .panel h3 {
        margin: 0 0 10px;
      }

      .subtle {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.7;
      }

      .question-label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        font-size: 0.84rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      .question-step {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 999px;
        background: var(--accent);
        color: #fffaf2;
        font-weight: 700;
        letter-spacing: normal;
      }

      .question {
        font-size: clamp(1.5rem, 3.2vw, 2rem);
        line-height: 1.25;
        margin-bottom: 16px;
        max-width: 100%;
      }

      .options {
        display: grid;
        gap: 14px;
      }

      .option {
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        background: var(--panel-strong);
        border-radius: 22px;
        padding: 22px 20px 20px;
        color: var(--text);
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
        position: relative;
        overflow: hidden;
      }

      .option:hover,
      .option:focus-visible {
        transform: translateY(-4px) scale(1.01);
        border-color: rgba(198, 93, 46, 0.4);
        background: #fff7ef;
        box-shadow: 0 16px 30px rgba(143, 47, 18, 0.1);
        outline: none;
      }

      .option::after {
        content: "";
        position: absolute;
        inset: auto -20px -50px auto;
        width: 120px;
        height: 120px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(198, 93, 46, 0.14), transparent 65%);
        transition: transform 180ms ease;
      }

      .option:hover::after,
      .option:focus-visible::after {
        transform: scale(1.1);
      }

      .option strong {
        display: block;
        font-size: 1.08rem;
        margin-bottom: 8px;
      }

      .option span {
        display: block;
        color: var(--muted);
        line-height: 1.6;
        font-size: 0.94rem;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
        flex-wrap: wrap;
      }

      .ghost {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--text);
      }

      .primary,
      .ghost {
        border-radius: 999px;
        padding: 11px 16px;
        cursor: pointer;
        font: inherit;
      }

      .primary {
        border: none;
        background: var(--accent);
        color: #fff7f3;
      }

      .result-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .badge {
        padding: 7px 11px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 0.84rem;
      }

      .cards {
        display: grid;
        gap: 14px;
        margin-top: 18px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.68);
      }

      .card h4 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }

      .card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .card .card-action {
        margin-top: 14px;
      }

      .mini {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff8f1;
        color: var(--text);
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
      }

      .note-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .note {
        padding: 14px 16px;
        border-left: 4px solid var(--accent);
        border-radius: 12px;
        background: rgba(198, 93, 46, 0.08);
        color: var(--text);
        line-height: 1.7;
      }

      .empty {
        color: var(--muted);
        line-height: 1.8;
      }

      .qa-stage {
        display: grid;
        gap: 18px;
      }

      .result-overlay {
        position: fixed;
        inset: 0;
        background: rgba(31, 28, 24, 0.35);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .result-overlay[hidden] {
        display: none;
      }

      .result-modal {
        width: min(820px, 100%);
        max-height: min(88vh, 920px);
        overflow: auto;
        padding: 28px;
      }

      .code-overlay {
        position: fixed;
        inset: 0;
        background: rgba(18, 15, 12, 0.46);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 30;
      }

      .code-overlay[hidden] {
        display: none;
      }

      .code-modal {
        width: min(920px, 100%);
        max-height: min(90vh, 980px);
        overflow: auto;
        padding: 24px;
        background: #fffdf8;
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: var(--shadow);
      }

      .code-modal pre {
        margin: 14px 0 0;
        padding: 16px;
        border-radius: 14px;
        overflow: auto;
        background: #1f1b16;
        color: #f8efe2;
        line-height: 1.55;
        font-size: 0.92rem;
      }

      .code-modal code {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      }

      @media (max-width: 900px) {
        .hero,
        .panel,
        .result-modal {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">scikit-learn estimator selection</div>
        <h1>sk-learn分析モデルガイド</h1>
        <p>
          質問に答えるだけで、条件に合うモデル候補を絞り込みます。
        </p>
      </section>

      <section class="panel">
        <div class="qa-stage">
          <div>
            <div class="question-label">
              <span id="question-step" class="question-step">Q1</span>
              <span>質問</span>
            </div>
            <div id="question" class="question"></div>
            <p id="question-help" class="subtle"></p>
          </div>

          <div id="options" class="options"></div>

          <div class="actions">
            <button id="back" class="ghost" type="button">戻る</button>
            <button id="reset" class="ghost" type="button">最初から</button>
          </div>
        </div>
      </section>
    </main>

    <div id="result-overlay" class="result-overlay" hidden>
      <section class="result-modal">
        <div id="result-empty" class="empty" hidden>
          左の質問に答えると、ここに候補モデルと補足が表示されます。
        </div>

        <div id="result">
          <div class="result-header">
            <div>
              <h2 id="result-title"></h2>
              <p id="result-summary" class="subtle"></p>
            </div>
            <div id="result-badge" class="badge"></div>
          </div>
          <div id="cards" class="cards"></div>
          <div id="notes" class="note-list"></div>
          <div class="actions">
            <button id="close-result" class="ghost" type="button">戻る</button>
            <button id="restart-result" class="primary" type="button">もう一度診断する</button>
          </div>
        </div>
      </section>
    </div>

    <div id="code-overlay" class="code-overlay" hidden>
      <section class="code-modal">
        <div class="result-header">
          <div>
            <h3 id="code-title">サンプルコード</h3>
            <p id="code-subtitle" class="subtle"></p>
          </div>
          <button id="close-code" class="ghost" type="button">閉じる</button>
        </div>
        <pre><code id="code-body"></code></pre>
      </section>
    </div>

      const closeCodeButton = document.getElementById("close-code");
      const codeTitleEl = document.getElementById("code-title");
      const codeSubtitleEl = document.getElementById("code-subtitle");
      const codeBodyEl = document.getElementById("code-body");
      const questionStepEl = document.getElementById("question-step");

      const state = {
        currentNode: "samples",
        history: [],
      };

      const codeSnippets = {

      };

      function getCodeSnippet(modelName) {
        return codeSnippets[modelName];
      }

      function hasCodeSnippet(modelName) {
        return Object.prototype.hasOwnProperty.call(codeSnippets, modelName);
      }

      function openCodeModal(modelName) {
        codeTitleEl.textContent = `${modelName} のサンプルコード`;
        codeSubtitleEl.textContent = "最小構成の例です。変数名は実データに合わせて置き換えてください。";
        codeBodyEl.textContent = getCodeSnippet(modelName);
        codeOverlayEl.hidden = false;
      }

      function closeCodeModal() {
        codeOverlayEl.hidden = true;
      }

      function renderQuestion() {
        const node = nodes[state.currentNode];
        questionStepEl.textContent = node.label;
        questionEl.textContent = node.text;
        helpEl.textContent = node.help;
        optionsEl.innerHTML = "";

        node.options.forEach((option, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "option";
          button.innerHTML = option.detail
            ? `<strong>${option.label}</strong><span>${option.detail}</span>`
            : `<strong>${option.label}</strong>`;
          button.addEventListener("click", () => chooseOption(index));
          optionsEl.appendChild(button);
        });

        backButton.disabled = state.history.length === 0;
      }

      function renderResult(resultId) {
        const result = results[resultId];
        resultEmptyEl.hidden = true;
        resultEl.hidden = false;
        resultOverlayEl.hidden = false;
        resultTitleEl.textContent = result.title;
        resultSummaryEl.textContent = result.summary;
        resultBadgeEl.textContent = result.badge;
        cardsEl.innerHTML = "";
        notesEl.innerHTML = "";
        notesEl.hidden = true;

        result.cards.forEach((card) => {
          const article = document.createElement("article");
          article.className = "card";
          article.innerHTML = `<h4>${card.name}</h4><p>${card.reason}</p>`;
          if (hasCodeSnippet(card.name)) {
            const action = document.createElement("div");
            action.className = "card-action";
            const button = document.createElement("button");
            button.type = "button";
            button.className = "mini";
            button.textContent = "サンプルコード";
            button.addEventListener("click", () => openCodeModal(card.name));
            action.appendChild(button);
            article.appendChild(action);
          }
          cardsEl.appendChild(article);
        });
      }

      function clearResult() {
        resultOverlayEl.hidden = true;
        closeCodeModal();
      }

      function chooseOption(index) {
        const node = nodes[state.currentNode];
        const choice = node.options[index];

        state.history.push({
          nodeId: state.currentNode,
          choice: choice.label,
        });

        if (choice.result) {
          renderResult(choice.result);
          return;
        }

        state.currentNode = choice.next;
        clearResult();
        renderQuestion();
      }

      function goBack() {
        if (state.history.length === 0) {
          return;
        }

        const last = state.history.pop();
        state.currentNode = last.nodeId;
        clearResult();
        renderQuestion();
      }

      function resetFlow() {
        state.currentNode = "samples";
        state.history = [];
        clearResult();
        renderQuestion();
      }

      backButton.addEventListener("click", goBack);
      resetButton.addEventListener("click", resetFlow);
      restartResultButton.addEventListener("click", resetFlow);
      closeResultButton.addEventListener("click", clearResult);
      closeCodeButton.addEventListener("click", closeCodeModal);
      resultOverlayEl.addEventListener("click", (event) => {
        if (event.target === resultOverlayEl) {
          clearResult();
        }
      });
      codeOverlayEl.addEventListener("click", (event) => {
        if (event.target === codeOverlayEl) {
          closeCodeModal();
        }
      });

      renderQuestion();
    </script>
  </body>
